description.French=<i>Vous avez à présent le vieux journal de Robert Olmstead en votre possession. Le savoir qu'il renferme pourrait bien vous servir à comprendre ce que vous avez vu dans les tréfonds d'Arkham. Mais la peur que vous nourrissez quant aux révélations qui semblent s'y trouver vous hante depuis plusieurs semaines de son ombre evanescente.\n\nVous vous apprêtez à parcourir les pages de l'étrange manuscrit et à entrer dans la tête de celui que certain ont appelé après votre passage "La Chose d'Arkham".</i>\n\nUne aventure faite pour Les Demeures de l'Épouvante, 2nd édition. Pas de contenu additionnel nécessaire.\n\nNB : Pour les plus soucieux des détails, quelques anachronismes sont présents dans le scénario, j'ai décidé de les garder puisqu'ils n'impactent en rien la cohérence de l'histoire. 
